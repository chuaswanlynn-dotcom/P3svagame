<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subject-Verb Agreement Game</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
  .round-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.75rem; }
  .score-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
  .sc { background: #ebe9e2; border-radius: 8px; padding: 0.6rem 1rem; text-align: center; }
  .sc-num { font-size: 22px; font-weight: 600; }
  .sc-label { font-size: 12px; color: #666; margin-top: 2px; }
  .prog-wrap { background: #ebe9e2; border-radius: 999px; height: 6px; margin-bottom: 1.25rem; overflow: hidden; }
  .prog-fill { height: 6px; border-radius: 999px; background: #3b6d11; transition: width 0.3s; }
  .card { background: #fff; border: 1px solid #e0ded6; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }
  .badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 6px; margin-bottom: 1rem; font-weight: 600; }
  .b-s { background: #ddeeff; color: #0c447c; }
  .b-p { background: #e6f5d0; color: #27500a; }
  .b-c { background: #fef0d4; color: #633806; }
  .b-u { background: #fce8f0; color: #72243e; }
  .sentence { font-size: 18px; line-height: 1.7; margin-bottom: 1.25rem; }
  .blank { display: inline-block; min-width: 60px; border-bottom: 2px solid #aaa; text-align: center; padding: 0 4px; }
  .choices { display: flex; gap: 10px; flex-wrap: wrap; }
  .cbtn { padding: 0.5rem 1.4rem; background: #fff; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; cursor: pointer; color: #1a1a1a; transition: background 0.15s; }
  .cbtn:hover:not(:disabled) { background: #f0ede6; }
  .cbtn.ok { background: #e6f5d0; border-color: #3b6d11; color: #173404; }
  .cbtn.no { background: #fde8e8; border-color: #a32d2d; color: #501313; }
  .cbtn:disabled { cursor: not-allowed; opacity: 0.75; }
  .fb { margin-top: 1rem; font-size: 14px; padding: 0.65rem 1rem; border-left: 3px solid; line-height: 1.6; }
  .fb.ok { background: #e6f5d0; color: #173404; border-color: #3b6d11; }
  .fb.no { background: #fde8e8; color: #501313; border-color: #a32d2d; }
  .hint { font-size: 12px; color: #aaa; margin-top: 0.75rem; }
  .nav { margin-top: 1rem; }
  .gate { background: #fff; border: 1px solid #e0ded6; border-radius: 12px; padding: 2rem 1.5rem; text-align: center; }
  .gate-title { font-size: 22px; font-weight: 600; margin-bottom: 0.5rem; }
  .gate-sub { font-size: 15px; color: #555; margin-bottom: 1.5rem; }
  .gate-retry-box { background: #fde8e8; border: 1px solid #f09595; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; text-align: left; }
  .gate-retry-box p { font-size: 14px; color: #501313; margin-bottom: 0.6rem; font-weight: 600; }
  .missed-list { font-size: 13px; color: #791f1f; line-height: 2; }
  .action-btn { display: inline-block; padding: 0.6rem 1.6rem; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #1a1a1a; font-size: 15px; cursor: pointer; }
  .action-btn:hover { background: #f0ede6; }
  .cloze-passage { font-size: 16px; line-height: 2.4; color: #1a1a1a; }
  .cloze-sel { font-size: 14px; border: 1px solid #ccc; border-radius: 6px; padding: 2px 6px; background: #f5f4f0; color: #1a1a1a; cursor: pointer; margin: 0 3px; }
  .cloze-sel.ok { background: #e6f5d0; border-color: #3b6d11; color: #173404; }
  .cloze-sel.no { background: #fde8e8; border-color: #a32d2d; color: #501313; }
  .cloze-sel:disabled { cursor: not-allowed; }
  .cloze-fb { margin-top: 1.25rem; }
  .cloze-score { font-size: 15px; font-weight: 600; margin-bottom: 0.75rem; }
  .cloze-fb-item { font-size: 13px; padding: 0.4rem 0.75rem; border-left: 3px solid; margin-bottom: 6px; line-height: 1.5; }
  .cloze-fb-item.ok { background: #e6f5d0; color: #173404; border-color: #3b6d11; }
  .cloze-fb-item.no { background: #fde8e8; color: #501313; border-color: #a32d2d; }
  .end { text-align: center; padding: 3rem 1rem; }
  .end-num { font-size: 56px; font-weight: 700; }
  .end-msg { font-size: 16px; color: #555; margin: 0.5rem 0 1.5rem; }
  .star { font-size: 32px; margin-bottom: 0.5rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Subject-verb agreement</h1>
  <p class="subtitle">Primary 3 — two rounds. Score 12/12 in Round 1 to unlock Round 2.</p>
  <div id="root"></div>
</div>

<script>
const R1 = [
  {cat:"s",sentence:"The dog ___ loudly at night.",options:["bark","barks"],answer:"barks",exp:"'The dog' is singular — use 'barks'."},
  {cat:"p",sentence:"The boys ___ football in the field.",options:["plays","play"],answer:"play",exp:"'The boys' is plural — use 'play' (no -s)."},
  {cat:"c",sentence:"The committee ___ meeting tomorrow.",options:["is","are"],answer:"is",exp:"'The committee' is a collective noun acting as one unit — use 'is'."},
  {cat:"u",sentence:"The milk in the fridge ___ gone off.",options:["has","have"],answer:"has",exp:"'Milk' is uncountable — always takes a singular verb like 'has'."},
  {cat:"s",sentence:"My teacher ___ English very well.",options:["speak","speaks"],answer:"speaks",exp:"'My teacher' is singular — use 'speaks'."},
  {cat:"p",sentence:"The leaves ___ off the trees in autumn.",options:["fall","falls"],answer:"fall",exp:"'The leaves' is plural — use 'fall'."},
  {cat:"c",sentence:"The audience ___ clapping loudly.",options:["was","were"],answer:"was",exp:"'The audience' is a collective noun treated as one group — use 'was'."},
  {cat:"u",sentence:"The equipment ___ been checked.",options:["has","have"],answer:"has",exp:"'Equipment' is uncountable — use 'has'."},
  {cat:"s",sentence:"She ___ to school by bus every day.",options:["go","goes"],answer:"goes",exp:"'She' is singular — use 'goes'."},
  {cat:"p",sentence:"The workers ___ on strike last week.",options:["was","were"],answer:"were",exp:"'The workers' is plural — use 'were'."},
  {cat:"c",sentence:"A pride of lions ___ resting under the tree.",options:["is","are"],answer:"is",exp:"'A pride' is a collective noun — use 'is'."},
  {cat:"u",sentence:"The information ___ very useful.",options:["is","are"],answer:"is",exp:"'Information' is uncountable — use 'is'."},
];

const CLOZE_TEXT = [
  {t:"Our class "},{t:"",b:0},{t:" on a trip to the zoo last Saturday. The whole school "},{t:"",b:1},
  {t:" very excited. A group of students "},{t:"",b:2},{t:" near the lion enclosure. The lions "},{t:"",b:3},
  {t:" loudly, and everyone "},{t:"",b:4},{t:" a little scared. The zookeeper, Mr Tan, "},{t:"",b:5},
  {t:" us about the animals. He said that equipment used to feed the lions "},{t:"",b:6},
  {t:" cleaned every day. The water in the drinking troughs also "},{t:"",b:7},
  {t:" replaced twice daily. Later, a flock of flamingos "},{t:"",b:8},
  {t:" across the pond. The crowd "},{t:"",b:9},
  {t:" in amazement. Our teacher said that wildlife "},{t:"",b:10},
  {t:" precious and we must protect it. Everyone "},{t:"",b:11},{t:" home happy that day."}
];

const BLANKS = [
  {options:["go","went"],answer:"went",exp:"'Our class' is singular (past tense) — 'went'."},
  {options:["was","were"],answer:"was",exp:"'The whole school' is a collective noun — 'was'."},
  {options:["stood","stand"],answer:"stood",exp:"'A group of students' is collective, past tense — 'stood'."},
  {options:["roared","roars"],answer:"roared",exp:"'The lions' is plural, past tense — 'roared'."},
  {options:["felt","feel"],answer:"felt",exp:"'Everyone' is singular — 'felt'."},
  {options:["told","tell"],answer:"told",exp:"'Mr Tan' is singular, past tense — 'told'."},
  {options:["is","are"],answer:"is",exp:"'Equipment' is uncountable — 'is'."},
  {options:["is","are"],answer:"is",exp:"'Water' is uncountable — 'is'."},
  {options:["glided","glide"],answer:"glided",exp:"'A flock' is collective, past tense — 'glided'."},
  {options:["gasped","gasp"],answer:"gasped",exp:"'The crowd' is collective, past tense — 'gasped'."},
  {options:["is","are"],answer:"is",exp:"'Wildlife' is uncountable — 'is'."},
  {options:["went","go"],answer:"went",exp:"'Everyone' is singular, past tense — 'went'."},
];

const catLabel = {s:"Singular subject",p:"Plural subject",c:"Collective noun",u:"Uncountable noun"};
const catClass = {s:"b-s",p:"b-p",c:"b-c",u:"b-u"};

let phase = "r1";
let r1 = {idx:0,score:0,answered:false,wrong:[],shuffled:[]};
let r2 = {submitted:false,score:0,feedback:[]};

function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }

function init(){
  r1.shuffled = shuffle(R1);
  render();
}

function render(){
  if(phase==="r1") renderR1();
  else if(phase==="gate") renderGate();
  else if(phase==="r2") renderR2();
  else renderEnd();
}

function renderR1(){
  const q = r1.shuffled[r1.idx];
  const pct = Math.round((r1.idx/R1.length)*100);
  const sentHTML = q.sentence.replace("___","<span class='blank'>&nbsp;&nbsp;&nbsp;&nbsp;</span>");
  document.getElementById("root").innerHTML = `
    <div class="round-label">Round 1 of 2 — sentence practice</div>
    <div class="score-bar">
      <div class="sc"><div class="sc-num">${r1.score}</div><div class="sc-label">Correct</div></div>
      <div class="sc"><div class="sc-num">${r1.idx+1} / ${R1.length}</div><div class="sc-label">Question</div></div>
      <div class="sc"><div class="sc-num">${R1.length-r1.idx-1}</div><div class="sc-label">Left</div></div>
    </div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <span class="badge ${catClass[q.cat]}">${catLabel[q.cat]}</span>
      <div class="sentence">${sentHTML}</div>
      <div class="choices">
        ${q.options.map(o=>`<button class="cbtn" onclick="r1Choose('${o}')">${o}</button>`).join("")}
      </div>
      <div id="r1fb"></div>
      <div class="hint">Click a word to complete the sentence.</div>
    </div>
    <div id="r1nav"></div>`;
}

function r1Choose(opt){
  if(r1.answered) return;
  r1.answered = true;
  const q = r1.shuffled[r1.idx];
  const ok = opt===q.answer;
  if(ok) r1.score++; else r1.wrong.push(q);
  document.querySelectorAll(".cbtn").forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer) b.classList.add("ok");
    else if(b.textContent===opt && !ok) b.classList.add("no");
  });
  document.getElementById("r1fb").innerHTML=`<div class="fb ${ok?"ok":"no"}">${ok?"Correct!":"Not quite."} ${q.exp}</div>`;
  document.getElementById("r1nav").innerHTML=`<div class="nav"><button class="action-btn" onclick="r1Next()">Next &rarr;</button></div>`;
}

function r1Next(){
  r1.idx++;
  r1.answered=false;
  if(r1.idx>=R1.length){ phase="gate"; render(); return; }
  render();
}

function renderGate(){
  const ok = r1.score===R1.length;
  let inner;
  if(ok){
    inner=`<div class="star">&#9733;</div>
      <div class="gate-title">Perfect score!</div>
      <div class="gate-sub">You answered all 12 correctly. You may now move on to Round 2.</div>
      <button class="action-btn" onclick="phase='r2';render()">Start Round 2 &rarr;</button>`;
  } else {
    const missed = r1.wrong.map(q=>`<div>&bull; "${q.sentence}" &rarr; <strong>${q.answer}</strong></div>`).join("");
    inner=`<div class="gate-title">Score: ${r1.score} / 12</div>
      <div class="gate-sub">You need 12/12 to move on. Review what you missed, then try again.</div>
      <div class="gate-retry-box"><p>Questions to review:</p><div class="missed-list">${missed}</div></div>
      <button class="action-btn" onclick="retryR1()">Try Round 1 again &rarr;</button>`;
  }
  document.getElementById("root").innerHTML=`<div class="gate">${inner}</div>`;
}

function retryR1(){
  r1={idx:0,score:0,answered:false,wrong:[],shuffled:shuffle(R1)};
  phase="r1"; render();
}

function renderR2(){
  let passageHTML="";
  CLOZE_TEXT.forEach(seg=>{
    passageHTML+=seg.t;
    if(seg.b!==undefined){
      const bl=BLANKS[seg.b];
      const dis=r2.submitted?"disabled":"";
      const cls=r2.submitted?(r2.feedback[seg.b]&&r2.feedback[seg.b].ok?"ok":"no"):"";
      passageHTML+=`<select class="cloze-sel ${cls}" id="cl${seg.b}" ${dis}>
        <option value="">—</option>
        ${bl.options.map(o=>`<option value="${o}">${o}</option>`).join("")}
      </select>`;
    }
  });

  let fbHTML="";
  if(r2.submitted){
    const allOk=r2.score===BLANKS.length;
    fbHTML=`<div class="cloze-fb">
      <div class="cloze-score">Score: ${r2.score} / ${BLANKS.length}${allOk?" — well done!":""}</div>
      ${r2.feedback.map((f,i)=>f.ok?"":`<div class="cloze-fb-item no">Blank ${i+1}: the answer is <strong>${f.answer}</strong>. ${f.exp}</div>`).join("")}
      ${allOk?`<div class="cloze-fb-item ok">All correct — excellent work!</div>`:""}
    </div>`;
  }

  const submitBtn = r2.submitted ? "" : `<button class="action-btn" style="margin-top:1.25rem" onclick="submitCloze()">Check my answers</button>`;
  const nextBtn = r2.submitted && r2.score===BLANKS.length ? `<button class="action-btn" style="margin-top:1rem" onclick="phase='end';render()">See final result &rarr;</button>` : "";
  const retryBtn = r2.submitted && r2.score<BLANKS.length ? `<button class="action-btn" style="margin-top:1rem" onclick="retryR2()">Try again &rarr;</button>` : "";

  document.getElementById("root").innerHTML=`
    <div class="round-label">Round 2 of 2 — cloze passage</div>
    <div class="card">
      <p style="font-size:13px;color:#888;margin-bottom:1rem;">Choose the correct verb for each blank to complete the passage.</p>
      <div class="cloze-passage">${passageHTML}</div>
      ${submitBtn}${fbHTML}${nextBtn}${retryBtn}
    </div>`;
}

function submitCloze(){
  const fb=[];
  let score=0;
  BLANKS.forEach((bl,i)=>{
    const sel=document.getElementById("cl"+i);
    const val=sel?sel.value:"";
    const ok=val===bl.answer;
    if(ok) score++;
    fb.push({ok,answer:bl.answer,chosen:val,exp:bl.exp});
  });
  r2.submitted=true; r2.score=score; r2.feedback=fb;
  renderR2();
}

function retryR2(){
  r2={submitted:false,score:0,feedback:[]};
  renderR2();
}

function renderEnd(){
  document.getElementById("root").innerHTML=`
    <div class="end">
      <div class="end-num">24 / 24</div>
      <div class="end-msg">You completed both rounds with a perfect score. Outstanding work!</div>
      <button class="action-btn" onclick="fullRestart()">Play again from the start</button>
    </div>`;
}

function fullRestart(){
  r1={idx:0,score:0,answered:false,wrong:[],shuffled:[]};
  r2={submitted:false,score:0,feedback:[]};
  phase="r1"; init();
}

init();
</script>
</body>
</html>
